name: Python Unit Tests

on: [push, pull_request] # Runs whenever you push code

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Tests
        # We use 'python -m unittest' so it adds the current folder to the path
        # This prevents "ModuleNotFoundError: No module named 'pybank'"
        run: python -m unittest discover tests